<article class='card' style='background-color: white; padding: 16px; border-radius: 4px; box-shadow: 0 0 8px rgba(0,0,0,0.1);'>
<h2>分子上传</h2>
<p>将 PDB / SDF / MOL2 文件拖放到这里，或点击选择</p>
<input type="file" id="fileInput" accept=".pdb,.sdf,.mol2" style="display:none;">
<div id="dropArea" style="border:2px dashed #ddd;border-radius:6px;padding:30px;text-align:center;background:#fafafa;margin:16px 0;">
点击或拖放文件到这里
</div>
<button id="uploadBtn" style="background-color:#3498db;color:#fff;border:none;padding:8px 16px;font-size:16px;cursor:pointer;border-radius:4px;" disabled>解析并查看</button>
<div id="status" style="margin-top:16px;min-height:1.2rem;color:#333;white-space:pre-wrap;"></div>
</article>

<script>
const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('dropArea');
const uploadBtn = document.getElementById('uploadBtn');
const statusDiv = document.getElementById('status');

let selectedFile = null;

// ---------- 文件选择 ----------
function handleFiles(files) {
 if (files.length === 0) return;
 selectedFile = files[0];
 statusDiv.textContent = `已选择 ${selectedFile.name}`;
 uploadBtn.disabled = false;
}

// 拖放交互
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
 dropArea.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false);
});
['dragenter', 'dragover'].forEach(evt => {
 dropArea.addEventListener(evt, () => { dropArea.style.background = '#e0f7fa'; }, false);
});
['dragleave', 'drop'].forEach(evt => {
 dropArea.addEventListener(evt, () => { dropArea.style.background = '#fafafa'; }, false);
});
dropArea.addEventListener('drop', e => {
 const dt = e.dataTransfer;
 if (dt.files && dt.files.length) handleFiles(dt.files);
});
dropArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => handleFiles(fileInput.files));

// ---------- 解析函数 ----------
function parsePDB(text) {
 const atoms = [], bonds = [];
 const lines = text.split(/\r?\n/);
 for (const line of lines) {
  if (line.startsWith('ATOM') || line.startsWith('HETATM')) {
   const x = parseFloat(line.substring(30,38).trim());
   const y = parseFloat(line.substring(38,46).trim());
   const z = parseFloat(line.substring(46,54).trim());
   let elem = line.substring(76,78).trim();
   if (!elem) {
    const name = line.substring(12,16).trim();
    elem = name.replace(/[0-9]/g,'');
   }
   atoms.push({element: elem || 'C', x, y, z});
  }
 }
 for (let i = 0; i < atoms.length; i++) {
  for (let j = i+1; j < atoms.length; j++) {
   const dx = atoms[i].x - atoms[j].x, dy = atoms[i].y - atoms[j].y, dz = atoms[i].z - atoms[j].z;
   const d = Math.sqrt(dx*dx + dy*dy + dz*dz);
   if (d < 2.0) bonds.push({i, j, order: 1});
  }
 }
 return {atoms, bonds};
}
function parseSDF(text) {
 const lines = text.split(/\r?\n/);
 if (lines.length < 4) return {atoms:[], bonds:[]};
 const countsLine = lines[3];
 const atomCount = parseInt(countsLine.substring(0,3),10) || 0;
 const bondCount = parseInt(countsLine.substring(3,6),10) || 0;
 let pos = 4;
 const atoms = [];
 for (let i = 0; i < atomCount; i++) {
  const parts = lines[pos++].trim().split(/\s+/);
  const x = parseFloat(parts[0]), y = parseFloat(parts[1]), z = parseFloat(parts[2]);
  let elem = parts[3];
  if (!elem || elem.length > 2) elem = elem.replace(/[0-9]/g,'');
  atoms.push({element: elem || 'C', x, y, z});
 }
 const bonds = [];
 for (let i = 0; i < bondCount; i++) {
  const parts = lines[pos++].trim().split(/\s+/);
  const a = parseInt(parts[0]) - 1;
  const b = parseInt(parts[1]) - 1;
  let order = parseInt(parts[3]) || 1;
  if (isNaN(order)) order = 1;
  bonds.push({i:a, j:b, order});
 }
 return {atoms, bonds};
}
function parseMOL2(text) {
 const lines = text.split(/\r?\n/);
 let atoms = [], bonds = [];
 let section = null;
 for (const line of lines) {
  if (line.startsWith('@<TRIPOS>ATOM')) { section = 'atom'; continue; }
  if (line.startsWith('@<TRIPOS>BOND')) { section = 'bond'; continue; }
  if (line.startsWith('@<TRIPOS>')) { section = null; continue; }
  if (!section) continue;
  const parts = line.trim().split(/\s+/);
  if (section === 'atom' && parts.length >= 10) {
   const x = parseFloat(parts[2]), y = parseFloat(parts[3]), z = parseFloat(parts[4]);
   const atomType = parts[5];
   let elem = atomType.replace(/[0-9]/g,'');
   if (!elem) elem = 'C';
   atoms.push({element: elem, x, y, z});
  } else if (section === 'bond' && parts.length >= 4) {
   const a = parseInt(parts[1]) - 1;
   const b = parseInt(parts[2]) - 1;
   let order = 1;
   const type = parts[3];
   if (type === '2' || type === 'du' || type === 'double') order = 2;
   else if (type === '3' || type === 'tr' || type === 'triple') order = 3;
   else if (type === 'am' || type === 'ar') order = 1; // aromatic treated as single
   bonds.push({i:a, j:b, order});
  }
 }
 return {atoms, bonds};
}

// ---------- 上传按钮 ----------
uploadBtn.addEventListener('click', () => {
 if (!selectedFile) return;
 statusDiv.textContent = `正在解析 ${selectedFile.name}...`;
 const reader = new FileReader();
 reader.onload = e => {
  const text = e.target.result;
  const ext = selectedFile.name.split('.').pop().toLowerCase();
  let result;
  if (ext === 'pdb') result = parsePDB(text);
  else if (ext === 'sdf') result = parseSDF(text);
  else if (ext === 'mol2') result = parseMOL2(text);
  else {
   statusDiv.textContent = '不支持的文件格式';
   return;
  }
  const id = Math.random().toString(36).substring(2,10);
  sessionStorage.setItem(id, JSON.stringify(result));
  window.location = `viewer.html?id=${id}`;
 };
 reader.onerror = () => { statusDiv.textContent = '读取文件失败'; };
 reader.readAsText(selectedFile);
});
</script>
