<section style='margin-bottom: 16px;'><h2 style='margin-top: 0;'>分子比对</h2>
<div class='card' style='background-color: white; padding: 16px; border-radius: 4px; box-shadow: 0 0 8px rgba(0,0,0,0.1);'>
    <h3>上传两个分子文件（PDB 格式）</h3>
    <div style='margin-bottom:12px;'>
        <label>分子 A：</label><br>
        <input type='file' id='fileA' accept='.pdb,.txt' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;'>
    </div>
    <div style='margin-bottom:12px;'>
        <label>分子 B：</label><br>
        <input type='file' id='fileB' accept='.pdb,.txt' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;'>
    </div>
    <button id='cmpBtn' style='background-color:#3498db;color:white;border:none;padding:8px 16px;font-size:16px;cursor:pointer;border-radius:4px;'>开始比对</button>
    <div id='result' style='margin-top:16px;padding:12px;background:#f9f9f9;border-radius:4px;display:none;'>
        <p>相似度（RMSD）：<span id='rmsdVal'>—</span> Å</p>
        <p>匹配原子数：<span id='matchVal'>—</span></p>
    </div>
    <div id='svgContainer' style='margin-top:16px;text-align:center;'></div>
</div>
</section>

<script>
function parsePDB(text){
    const lines = text.split('\n');
    const atoms = [];
    for(const line of lines){
        if(line.startsWith('ATOM') || line.startsWith('HETATM')){
            // columns: x 31-38, y 39-46, z 47-54 (1-indexed)
            const x = parseFloat(line.substring(30,38));
            const y = parseFloat(line.substring(38,46));
            const z = parseFloat(line.substring(46,54));
            const elem = line.substring(76,78).trim() || line.substring(12,16).trim()[0];
            if(!isNaN(x)&&!isNaN(y)&&!isNaN(z)){
                atoms.push({x,y,z,elem});
            }
        }
    }
    return atoms;
}
function centroid(atoms){
    const n = atoms.length;
    let sx=0,sy=0,sz=0;
    for(const a of atoms){ sx+=a.x; sy+=a.y; sz+=a.z; }
    return {x:sx/n, y:sy/n, z:sz/n};
}
function rmsdAfterTranslate(a,b){
    // assume same length and order
    const n = a.length;
    let sum=0;
    for(let i=0;i<n;i++){
        const dx = a[i].x - b[i].x;
        const dy = a[i].y - b[i].y;
        const dz = a[i].z - b[i].z;
        sum+=dx*dx+dy*dy+dz*dz;
    }
    return Math.sqrt(sum/n);
}
function alignAndCompute(fileAText, fileBText){
    const A = parsePDB(fileAText);
    const B = parsePDB(fileBText);
    if(A.length===0 || B.length===0){ return {rmsd:NaN, match:0, A:[], B:[]}; }
    // make same length by truncating to shorter
    const len = Math.min(A.length,B.length);
    const Aslice = A.slice(0,len);
    const Bslice = B.slice(0,len);
    const centA = centroid(Aslice);
    const centB = centroid(Bslice);
    // translate both to origin
    const At = Aslice.map(a=>({x:a.x-centA.x, y:a.y-centA.y, z:a.z-centA.z-centA.z, elem:a.elem}));
    const Bt = Bslice.map(b=>({x:b.x-centB.x, y:b.y-centB.y, z:b.z-centB.z, elem:b.elem}));
    const rmsd = rmsdAfterTranslate(At,Bt);
    // match atoms within 1.0 Å after translation
    let match=0;
    const tol=1.0;
    for(let i=0;i<len;i++){
        const dx = At[i].x - Bt[i].x;
        const dy = At[i].y - Bt[i].y;
        const dz = At[i].z - Bt[i].z;
        if(Math.sqrt(dx*dx+dy*dy+dz*dz) <= tol) match++;
    }
    return {rmsd, match, A:At, B:Bt};
}
document.getElementById('cmpBtn').onclick = async ()=>{
    const fileA = document.getElementById('fileA').files[0];
    const fileB = document.getElementById('fileB').files[0];
    if(!fileA || !fileB){ alert('请先选择两个文件'); return; }
    const textA = await fileA.text();
    const textB = await fileB.text();
    const res = alignAndCompute(textA,textB);
    document.getElementById('rmsdVal').textContent = res.rmsd.toFixed(3);
    document.getElementById('matchVal').textContent = res.match;
    document.getElementById('result').style.display = 'block';
    // draw SVG
    const container = document.getElementById('svgContainer');
    container.innerHTML = '';
    if(res.A.length===0){ container.textContent='无法解析原子坐标'; return; }
    const width = 500, height = 300, padding = 40;
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width',width);
    svg.setAttribute('height',height);
    svg.setAttribute('style','border:1px solid #ccc;');
    // find bounds
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    [...res.A,...res.B].forEach(p=>{
        if(p.x<minX) minX=p.x;
        if(p.x>maxX) maxX=p.x;
        if(p.y<minY) minY=p.y;
        if(p.y>maxY) maxY=p.y;
    });
    const rangeX = maxX-minX || 1;
    const rangeY = maxY-minY || 1;
    const scaleX = (width-2*padding)/rangeX;
    const scaleY = (height-2*padding)/rangeY;
    const scale = Math.min(scaleX,scaleY);
    const cx = width/2 - scale*(minX+maxX)/2;
    const cy = height/2 - scale*(minY+maxY)/2;
    function trans(p){ return {x:cx+scale*p.x, y:cy+scale*p.y}; }
    // draw bonds (simplistic: connect sequential atoms)
    function drawPath(atoms,color){
        if(atoms.length<2) return;
        const polyline = document.createElementNS('http://www.w3.org/2000/svg','polyline');
        const points = atoms.map(p=>`${trans(p).x},${trans(p).y}`).join(' ');
        polyline.setAttribute('points',points);
        polyline.setAttribute('fill','none');
        polyline.setAttribute('stroke',color);
        polyline.setAttribute('stroke-width',2);
        svg.appendChild(polyline);
    }
    drawPath(res.A,'#3498db'); // blue
    drawPath(res.B,'#e74c3c'); // red
    // draw atoms
    [...res.A,...res.B].forEach((p,i)=>{
        const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
        const t = trans(p);
        circle.setAttribute('cx',t.x);
        circle.setAttribute('cy',t.y);
        circle.setAttribute('r',4);
        circle.setAttribute('fill', i<res.A.length ? '#3498db' : '#e74c3c');
        svg.appendChild(circle);
    });
    container.appendChild(svg);
};
</script>
